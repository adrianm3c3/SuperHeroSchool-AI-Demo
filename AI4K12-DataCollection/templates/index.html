<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comic Scenario Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Bangers', cursive;
      background: repeating-linear-gradient(45deg, #a3e4ff, #a3e4ff 20px, #87ceeb 20px, #87ceeb 40px);
      height: 100vh;
      align-items: center;
      justify-content: center;
   
    }

    /* The grid container */
    .grid-container {
    display: grid;
    grid-template-areas: 
        'left left left left right right'
        'footer footer footer footer footer footer';
    
    } 

    .left,
    .middle,
    .right {
        padding: 10px;
        min-width: 400px;
        height: 100px;  
    }

   
    .left {
        grid-area: left;
    }

   
    .middle {
        grid-area: middle;
    }

   
    .right {
        grid-area: right;
        
    }

    
    .footer {
        grid-area: footer;
        background-color: #f1f1f1;
        padding: 10px;
        text-align: center;
    }

    
    @media (max-width: 600px) {
        .grid-container  {
            grid-template-areas:  
            'left left left left left left' 
            'right right right right right right' 
            'footer footer footer footer footer footer';
        }
    }

    .comic-container {
      background: white;
      /*width: 90%;
      height: 100%;
      max-width: 1000px;
      max-height: 600px;*/
      border-radius: 16px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      overflow: scroll;
      border: 5px solid black;
      animation: fadeIn 0.6s ease;
      padding: 20px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .left-panel {
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .right-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 30px;
    }

    .right-panel img {
      max-width: 300px;
      border-radius: 12px;
      border: 4px solid black;
    }

    h1 {
      font-size: 48px;
      color: #d60000;
      margin-bottom: 20px;
      text-shadow: 2px 2px 0 #000;
    }

    .question-box {
      background-color: #ffff99;
      padding: 20px;
      border-radius: 12px;
      font-size: 20px;
      font-weight: bold;
      border: 4px solid black;
      margin-bottom: 30px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .option {
      background-color: #e0f7ff;
      border: 3px solid black;
      border-radius: 10px;
      padding: 15px;
      font-size: 18px;
      cursor: pointer;
    }

    .option:hover {
      background-color: #c7eaff;
    }

    .submit-btn {
      margin-top: 25px;
      background-color: #000;
      color: #fff;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 10px;
    }

    .submit-btn:hover {
      background-color: #222;
    }

    .prediction-result {
      background-color: #fdfdfd;
      border: 3px solid black;
      padding: 15px;
      font-size: 18px;
      margin-bottom: 25px;
      border-radius: 10px;
    }

    .scenario-result {
      margin-bottom: 20px;
      border-bottom: 2px dashed #aaa;
      padding-bottom: 10px;
    }

    .tag-badge {
      font-weight: bold;
      padding: 4px 10px;
      border-radius: 8px;
      background-color: #ffe066;
      color: #000;
      margin-left: 5px;
    }

    .tag-badge.empathy_teamwork { background-color: #8ef5c4; }
    .tag-badge.aggression_bravery { background-color: #ff9b9b; }
    .tag-badge.leadership { background-color: #ffd966; }
    .tag-badge.strategy { background-color: #b4d9ff; }
    .tag-badge.none { background-color: #ccc; }
  </style>
</head>
<body>
  
  <div id="app"></div>

  <script>
    let currentScenario = 0;

    async function fetchScenario(index, choice = null, reason = "") {
      const response = await fetch("/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ choice: choice, reason: reason })
      });
      return response.json();
    }

    function renderScenario(data) {
      const app = document.getElementById("app");

      if (data.error) {
        app.innerHTML = `<h1 style="font-family: Bangers, cursive; font-size: 60px; color: #fff; text-shadow: 2px 2px 0 #000;">${data.error}</h1>`;
        return;
      }

      if (data.final) {
        const tag = (data.prediction || "mystery").replace(/_/g, " ");
        const tagClass = (data.prediction || "none").toLowerCase().replace(/ /g, "_");
        const heroUpper = tag.toUpperCase();
        const heroDesc = {
          "empathy teamwork": "You’re a compassionate leader who values others before yourself.",
          "aggression bravery": "You charge in with courage and take bold risks!",
          "leadership": "You take control when it matters most.",
          "strategy": "You always think ahead and stay calm under pressure.",
          "none": "You’re unpredictable — a wildcard in the best way!"
        }[tag] || "You’ve forged your own unique heroic path.";

        const predictionsHTML = (data.model_scenarios || []).map((item, i) => {
          return `
            <div class="scenario-result">
              <b>Scenario ${i + 1}:</b> <i>${item.prompt}</i><br>
              → <b>Predicted:</b> "${item.choice}"<br>
              → <b>Tag:</b> <span class="tag-badge ${item.tag.replace(/ /g, "_")}">${item.tag}</span>
              <span style="color:#555;">(${item.confidence})</span>
            </div>
          `;
        }).join("");

        app.innerHTML = `
          <div class="grid-container">
            <div class="left">
              <div class="comic-container">
                <h1>MODEL PREDICTIONS</h1>
                <div class="prediction-result">${predictionsHTML}</div>
              </div>
            </div>
            <div class="right">
              <div class="comic-container">
                <img src="/static/images/testimage.png" alt="Hero Badge">
                <h1 style="font-size: 48px;">YOU ARE A<br><span style="color: #d60000;">${heroUpper}</span> HERO!</h1>
                <div class="question-box" style="font-size: 22px;">${heroDesc}</div>
                <button class="submit-btn" style="font-family:inherit" onclick="location.href='/'">Restart</button>
              </div>
            </div>
          </div>
        `;
        return;
      }

      const optionsHTML = data.choices.map((text, i) => `
        <label class="option">
          <input type="radio" name="choice" value="${i + 1}"> ${text}
        </label>
      `).join("");

      app.innerHTML = `
        <div class="grid-container">
            <div class="left">
              <div class="comic-container">
                <h1>Superhero School</h1>
                <div class="question-box">${data.scenario}</div>
                <div class="options">${optionsHTML}</div>
                <textarea id="reason" placeholder="Why did you choose this option?" style="margin-top:15px; padding:10px; width:100%; font-family:inherit; font-size:16px;"></textarea>
                <button class="submit-btn" style="font-family:inherit" onclick="submitChoice()">Submit</button>
              </div>
            </div>
            <div class="right">
              <div class="comic-container">
                <img src=${data.image} alt="Scenario Illustration">
              </div>
            </div>
        </div>
      `;
    }

    async function submitChoice() {
      const choiceInput = document.querySelector("input[name='choice']:checked");
      const reasonInput = document.getElementById("reason").value.trim();
      if (!choiceInput || !reasonInput) {
        alert("Please select an option and provide a reason.");
        return;
      }
      const choiceValue = choiceInput.value;
      const next = await fetchScenario(currentScenario, choiceValue, reasonInput);
      currentScenario++;
      renderScenario(next);
    }

    (async () => {
      const initial = await fetchScenario(currentScenario);
      renderScenario(initial);
    })();
  </script>
</body>
</html>
