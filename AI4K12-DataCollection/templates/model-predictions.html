<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comic Scenario Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Bangers', cursive;
      background: repeating-linear-gradient(45deg, #a3e4ff, #a3e4ff 20px, #87ceeb 20px, #87ceeb 40px);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: auto;
    }

    .comic-container {
      background: white;
      width: 90%;
      height: 100%;
      max-width: 1000px;
      max-height: 600px;
      border-radius: 16px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      overflow: scroll;
      border: 5px solid black;
      animation: fadeIn 0.6s ease;
      padding: 20px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .left-panel {
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .right-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 30px;
    }

    .right-panel img {
      max-width: 300px;
      border-radius: 12px;
      border: 4px solid black;
    }

    h1 {
      font-size: 48px;
      color: #d60000;
      margin-bottom: 20px;
      text-shadow: 2px 2px 0 #000;
    }

    .question-box {
      background-color: #ffff99;
      padding: 20px;
      border-radius: 12px;
      font-size: 20px;
      font-weight: bold;
      border: 4px solid black;
      margin-bottom: 30px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .option {
      background-color: #e0f7ff;
      border: 3px solid black;
      border-radius: 10px;
      padding: 15px;
      font-size: 18px;
      cursor: pointer;
    }

    .option:hover {
      background-color: #c7eaff;
    }

    .submit-btn {
      margin-top: 25px;
      background-color: #000;
      color: #fff;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 10px;
    }

    .submit-btn:hover {
      background-color: #222;
    }

    .prediction-result {
      background-color: #fdfdfd;
      border: 3px solid black;
      padding: 15px;
      font-size: 18px;
      margin-bottom: 25px;
      border-radius: 10px;
    }

    .scenario-result {
      margin-bottom: 20px;
      border-bottom: 2px dashed #aaa;
      padding-bottom: 10px;
    }

    .tag-badge {
      font-weight: bold;
      padding: 4px 10px;
      border-radius: 8px;
      background-color: #ffe066;
      color: #000;
      margin-left: 5px;
    }

    .tag-badge.empathy_teamwork { background-color: #8ef5c4; }
    .tag-badge.aggression_bravery { background-color: #ff9b9b; }
    .tag-badge.leadership { background-color: #ffd966; }
    .tag-badge.strategy { background-color: #b4d9ff; }
    .tag-badge.none { background-color: #ccc; }
  </style>
</head>
<body>
    <h1>Model Predictions Page</h1>
    <div class="comic-container">
        <div class="left-panel">
          <h1>MODEL PREDICTIONS</h1>
          <div class="prediction-result">${predictionsHTML}</div>
          <h1 style="font-size: 48px;">YOU ARE A<br><span style="color: #d60000;">${heroUpper}</span> HERO!</h1>
          <div class="question-box" style="font-size: 22px;">${heroDesc}</div>
        </div>
        <div class="right-panel">
          <img src="https://i.imgur.com/Wv3a2yM.png" alt="Hero Badge">
        </div>
      </div>
</body>
