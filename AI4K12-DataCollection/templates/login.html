<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login to Hero Academy</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Bangers', sans-serif;
      background: radial-gradient(circle at center, #fceabb, #f8b500);
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: #fff9ec;
      border: 6px solid black;
      border-radius: 24px;
      padding: 40px;
      width: 500px;
      box-shadow: 10px 10px 0 #000;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      color: #d32f2f;
      text-shadow: 2px 2px #000;
      margin-bottom: 30px;
    }

    label {
      font-size: 1.5em;
      display: block;
      margin: 20px 0 10px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      font-size: 1.2em;
      border-radius: 12px;
      border: 2px solid #000;
      font-family: sans-serif;
      box-sizing: border-box;
    }

    button {
      margin-top: 30px;
      padding: 12px 30px;
      font-size: 1.5em;
      font-family: 'Bangers', sans-serif;
      background-color: #29b6f6;
      color: #000;
      border: 3px solid #000;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 4px 4px 0 #000;
    }

    button:hover {
      background-color: #0288d1;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Hero Login</h1>
    <form id="login-form" action="/login" method="POST">
      <label for="first-name">First Name</label>
      <input type="text" id="first-name" name="first_name" required />

      <label for="last-initial">Last Initial</label>
      <input type="text" id="last-initial" name="last_initial" maxlength="1" required />

      <label for="grade">Grade Level</label>
      <select id="grade" name="grade" required>
        <option value="" disabled selected>Select Grade</option>
        <option value="6">6th Grade</option>
        <option value="7">7th Grade</option>
        <option value="8">8th Grade</option>
      </select>

      <button type="submit">Enter Hero School</button>
    </form>
  </div>

  <script>
    document.getElementById("login-form").addEventListener("submit", function () {
      console.log("SUBMITTING FORM");
    });
  </script>
</body>
</html>
